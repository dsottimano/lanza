# Sveltia CMS — git-based. Commits straight to the content in this repo.
# Auth: use "Sign in with Token" (a GitHub fine-grained PAT) — no auth Worker needed
# for a solo/technical editor. Add the sveltia-cms-auth Worker later if non-technical
# editors join. Editorial workflow is not supported in Sveltia yet, so the `draft`
# boolean below IS the review gate (Astro hides drafts from the production build).
backend:
  name: github
  repo: dsottimano/emdash-starter
  branch: main # change to your deploy branch

# Media lives in the site's public dir and ships as static assets.
media_folder: public/images/uploads
public_folder: /images/uploads

# WordPress-style sidebar: Posts / Pages, then taxonomies, then Settings.
# `icon` uses Material Symbols names; `divider: true` groups the rail.
collections:
  # ── Content ────────────────────────────────────────────────────────────
  - name: posts
    label: Posts
    label_singular: Post
    icon: push_pin
    folder: src/content/posts
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    # WordPress posts-screen ergonomics: status tabs, sort, group, thumbnail.
    thumbnail: featuredImage
    sortable_fields: [title, pubDate]
    view_filters:
      - { label: Published, field: draft, pattern: false }
      - { label: Drafts, field: draft, pattern: true }
    view_groups:
      - { label: Year, field: pubDate, pattern: '\d{4}' }
    fields:
      - { name: title, label: Title, widget: string }
      - { name: pubDate, label: Publish date, widget: datetime }
      - {
          name: updatedDate,
          label: Last updated,
          widget: datetime,
          required: false,
        }
      - {
          name: draft,
          label: Draft (uncheck to publish),
          widget: boolean,
          default: true,
        }
      - { name: description, label: Excerpt, widget: text, required: false }
      - { name: featuredImage, label: Featured image, widget: image, required: false }
      - name: categories
        label: Categories
        widget: relation
        collection: categories
        value_field: "{{slug}}"
        display_fields: [title]
        search_fields: [title]
        multiple: true
        required: false
      - name: tags
        label: Tags
        widget: relation
        collection: tags
        value_field: "{{slug}}"
        display_fields: [title]
        search_fields: [title]
        multiple: true
        required: false
      - label: SEO
        name: seo
        widget: object
        required: false
        collapsed: true
        fields:
          - { name: metaTitle, label: Meta title (overrides title), widget: string, required: false }
          - {
              name: metaDescription,
              label: Meta description,
              widget: text,
              required: false,
            }
          - { name: ogImage, label: OG / social image, widget: image, required: false }
          - {
              name: canonical,
              label: Canonical URL (override),
              widget: string,
              required: false,
              hint: "Leave blank to auto-derive from the page path",
            }
          - {
              name: ogType,
              label: OG type,
              widget: select,
              options: ["website", "article"],
              default: "article",
              required: false,
            }
          - {
              name: noindex,
              label: Hide from search engines (noindex),
              widget: boolean,
              default: false,
              required: false,
            }
          - { name: author, label: Author (JSON-LD), widget: string, required: false }
      - { name: body, label: Body, widget: markdown }

  - name: pages
    label: Pages
    label_singular: Page
    icon: description
    folder: src/content/pages
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    thumbnail: featuredImage
    sortable_fields: [title]
    fields:
      - { name: title, label: Title, widget: string }
      - {
          name: draft,
          label: Draft (uncheck to publish),
          widget: boolean,
          default: true,
        }
      - { name: description, label: Excerpt, widget: text, required: false }
      - { name: featuredImage, label: Featured image, widget: image, required: false }
      - label: SEO
        name: seo
        widget: object
        required: false
        collapsed: true
        fields:
          - { name: metaTitle, label: Meta title (overrides title), widget: string, required: false }
          - {
              name: metaDescription,
              label: Meta description,
              widget: text,
              required: false,
            }
          - { name: ogImage, label: OG / social image, widget: image, required: false }
          - {
              name: canonical,
              label: Canonical URL (override),
              widget: string,
              required: false,
              hint: "Leave blank to auto-derive from the page path",
            }
          - {
              name: ogType,
              label: OG type,
              widget: select,
              options: ["website", "article"],
              default: "website",
              required: false,
            }
          - {
              name: noindex,
              label: Hide from search engines (noindex),
              widget: boolean,
              default: false,
              required: false,
            }
      - { name: body, label: Body, widget: markdown }

  - divider: true

  # ── Taxonomies ─────────────────────────────────────────────────────────
  - name: categories
    label: Categories
    label_singular: Category
    icon: category
    folder: src/content/categories
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { name: title, label: Name, widget: string }
      - { name: description, label: Description, widget: text, required: false }

  - name: tags
    label: Tags
    label_singular: Tag
    icon: sell
    folder: src/content/tags
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { name: title, label: Name, widget: string }
      - { name: description, label: Description, widget: text, required: false }

  - divider: true

  # ── Settings ───────────────────────────────────────────────────────────
  - name: settings
    label: Settings
    icon: settings
    files:
      - name: seo_defaults
        label: SEO defaults
        file: src/data/seo.json
        fields:
          - { name: siteName, label: Site name, widget: string }
          - {
              name: titleTemplate,
              label: Title template,
              widget: string,
              hint: "Use %s where the page title goes, e.g. '%s · My Site'",
            }
          - { name: defaultTitle, label: Default title, widget: string }
          - { name: defaultDescription, label: Default description, widget: text }
          - {
              name: defaultOgImage,
              label: Default OG image,
              widget: image,
              required: false,
            }
          - {
              name: locale,
              label: Locale,
              widget: string,
              default: "en_US",
              hint: "og:locale, e.g. en_US",
            }
          - {
              name: twitter,
              label: Twitter @site handle,
              widget: string,
              required: false,
            }
          - {
              name: twitterCreator,
              label: Twitter @creator handle,
              widget: string,
              required: false,
            }
          - label: Organization (JSON-LD)
            name: organization
            widget: object
            fields:
              - { name: name, label: Name, widget: string }
              - { name: logo, label: Logo, widget: image, required: false }
              - {
                  name: sameAs,
                  label: Social profile URLs,
                  widget: list,
                  required: false,
                  hint: "One URL per item (sameAs)",
                }

      - name: menu
        label: Menu
        file: src/data/menu.json
        fields:
          - name: items
            label: Menu items
            widget: list
            label_singular: Menu item
            summary: "{{label}} → {{url}}"
            fields:
              - { name: label, label: Label, widget: string }
              - {
                  name: url,
                  label: URL / path,
                  widget: string,
                  hint: "e.g. /, /about/, or https://example.com",
                }

      - name: redirects
        label: Redirects
        file: src/data/redirects.json
        fields:
          - name: redirects
            label: Redirects
            widget: list
            fields:
              - { name: from, label: From path, widget: string }
              - { name: to, label: To path / URL, widget: string }
              - {
                  name: status,
                  label: Status code,
                  widget: number,
                  default: 301,
                  value_type: int,
                }
