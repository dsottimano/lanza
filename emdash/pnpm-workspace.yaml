packages:
  - "packages/plugins/*"

# Build scripts: allow only what each runtime needs; rest false so
# strictDepBuilds (pnpm >=10.26 / 11) passes.
allowBuilds:
  esbuild: true
  better-sqlite3: true
  sharp: true
  workerd: false

# Supply-chain hardening: cooldown on brand-new releases (EmDash exempt)
# and no non-registry transitive sources. (No trustPolicy: no-downgrade --
# it trips on upstream provenance regressions we don't control.)
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - emdash
  - "@emdash-cms/*"
blockExoticSubdeps: true

# EmDash 0.19.0 forgets to bind handleContentAuthors in the authenticated
# middleware locals, so the admin author-filter dropdown 500s. One-line patch.
patchedDependencies:
  emdash@0.19.0: patches/emdash@0.19.0.patch
