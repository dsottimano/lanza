packages:
  - "packages/plugins/*"

# Build scripts: allow only what each runtime needs; rest false so
# strictDepBuilds (pnpm >=10.26 / 11) passes.
allowBuilds:
  esbuild: true
  better-sqlite3: true
  sharp: true
  workerd: false

# Supply-chain hardening: cooldown on brand-new releases (EmDash exempt)
# and no non-registry transitive sources. (No trustPolicy: no-downgrade --
# it trips on upstream provenance regressions we don't control.)
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - emdash
  - "@emdash-cms/*"
blockExoticSubdeps: true

# NB: EmDash 0.19.0 forgets to bind handleContentAuthors in the authenticated
# middleware locals (admin author-filter dropdown 500s). Rule 1 forbids patching
# core, so the fix lives in src/middleware.ts (restoreContentAuthors) — NOT a
# pnpm patch here.
