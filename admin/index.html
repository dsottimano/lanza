<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Lanza</title>
  </head>
  <body>
    <!-- Liquid-glass distortion filter, referenced once by the sidebar rail
         (.rail-glass__distortion in src/styles.css). Hidden, zero-size. -->
    <svg aria-hidden="true" width="0" height="0" style="position: absolute">
      <filter id="glass-distortion" x="0" y="0" width="100%" height="100%">
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.009 0.009"
          numOctaves="2"
          seed="4"
          result="noise"
        />
        <feGaussianBlur in="noise" stdDeviation="2" result="blurred" />
        <feDisplacementMap
          in="SourceGraphic"
          in2="blurred"
          scale="55"
          xChannelSelector="R"
          yChannelSelector="G"
        />
      </filter>
    </svg>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
